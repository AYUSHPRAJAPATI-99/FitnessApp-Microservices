spring:
  application:
    name: user-service
  config:
# optional (if config server down don't give error)
    import: optional:configserver:http://localhost:8888

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
jwt:
  secret: ${JWT_SECRET}



